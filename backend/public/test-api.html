<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransGate AI Agent — Chat Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  h1 { padding: 16px 20px; font-size: 18px; background: #16213e; border-bottom: 1px solid #0f3460; }
  .container { flex: 1; display: flex; flex-direction: column; padding: 16px; max-width: 720px; width: 100%; margin: 0 auto; overflow: hidden; }
  .log { flex: 1; overflow-y: auto; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 13px; line-height: 1.6; padding: 12px; background: #0d1117; border-radius: 8px; border: 1px solid #30363d; }
  .log-entry { margin-bottom: 8px; padding: 6px 8px; border-radius: 4px; }
  .log-entry.progress { background: #1c2333; color: #79c0ff; }
  .log-entry.result { background: #0d2818; color: #7ee787; }
  .log-entry.pending { background: #1c1c33; color: #d2a8ff; }
  .log-entry.error { background: #2d1117; color: #f85149; }
  .log-entry.user { background: #1c2333; color: #999; }
  .log-entry .label { font-weight: 600; font-size: 11px; text-transform: uppercase; margin-bottom: 2px; }
  .log-entry pre { white-space: pre-wrap; word-break: break-all; }
  .controls { padding-top: 12px; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  input { background: #0d1117; border: 1px solid #30363d; color: #e0e0e0; padding: 8px 12px; border-radius: 6px; font-size: 14px; flex: 1; }
  input:focus { outline: none; border-color: #58a6ff; }
  button { background: #238636; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; white-space: nowrap; }
  button:hover { background: #2ea043; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary { background: #30363d; }
  button.secondary:hover { background: #484f58; }
  .config { display: flex; gap: 8px; margin-bottom: 8px; }
  .config input { max-width: 160px; }
  .status { font-size: 12px; color: #888; padding: 4px 0; }
</style>
</head>
<body>
<h1>TransGate AI Agent — Chat Test</h1>
<div class="container">
  <div class="log" id="chatLog"></div>
  <div class="controls">
    <div class="config">
      <input type="text" id="userId" placeholder="User ID" value="test-user-1">
      <input type="text" id="convId" placeholder="Conversation ID" value="conv-1">
      <button class="secondary" onclick="newConv()">New Conv</button>
    </div>
    <div class="row">
      <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter'&&!event.isComposing)sendChat()">
      <button id="sendBtn" onclick="sendChat()">Send</button>
    </div>
    <div class="status" id="chatStatus">Ready</div>
  </div>
</div>

<script>
const BASE = location.origin || 'http://localhost:3000';

function $(id) { return document.getElementById(id); }

function appendLog(type, label, content) {
  const log = $('chatLog');
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + type;
  const data = typeof content === 'string' ? content : JSON.stringify(content, null, 2);
  entry.innerHTML = `<div class="label">${label}</div><pre>${escHtml(data)}</pre>`;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function newConv() {
  $('convId').value = 'conv-' + Math.random().toString(36).slice(2, 8);
  $('chatLog').innerHTML = '';
  appendLog('progress', 'system', 'New conversation: ' + $('convId').value);
}

async function sendChat() {
  const msg = $('msgInput').value.trim();
  if (!msg) return;

  const userId = $('userId').value.trim() || 'anonymous';
  const convId = $('convId').value.trim() || 'default';

  $('msgInput').value = '';
  $('sendBtn').disabled = true;
  $('chatStatus').textContent = 'Sending...';

  appendLog('user', 'you', msg);

  try {
    const res = await fetch(BASE + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-User-Id': userId },
      body: JSON.stringify({ message: msg, conversationId: convId }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          const data = JSON.parse(line.slice(6));
          if (eventType === 'progress') {
            appendLog('progress', 'progress', data.message);
            $('chatStatus').textContent = data.message;
          } else if (eventType === 'result') {
            const style = data.action === 'error' ? 'error'
              : data.action === 'verify_pending' ? 'pending'
              : 'result';
            appendLog(style, data.action, data);
          }
          eventType = '';
        }
      }
    }
  } catch (err) {
    appendLog('error', 'error', err.message);
  } finally {
    $('sendBtn').disabled = false;
    $('chatStatus').textContent = 'Ready';
  }
}
</script>
</body>
</html>
